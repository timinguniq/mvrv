name: mvrv
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  freezed_annotation: ^3.1.0
  flutter_dotenv: ^6.0.0
  json_annotation: ^4.11.0
  logger: ^2.6.2
  intl: ^0.20.2
  firebase_remote_config: ^6.1.4
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  go_router: ^17.1.0
  provider: ^6.1.5+1
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  flutter_riverpod: ^3.2.1
  lottie: ^3.3.2
  pretty_dio_logger: ^1.4.0
  firebase_crashlytics: ^5.0.8
  get_it: ^9.2.1
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  cloud_firestore: ^6.0.2
  retrofit: ^4.9.2

dev_dependencies:
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  retrofit_generator: ^10.2.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "asset/icon/app_icon.png"
  web:
    generate: true
    image_path: "asset/icon/app_icon.png"
    background_color: "#2A2D3E"
    theme_color: "#2A2D3E"
  adaptive_icon_background: "#2A2D3E"
  adaptive_icon_foreground: "asset/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - asset/icon/
    - asset/image/
    - asset/lottie/

  fonts:
    - family: Pretendard
      fonts:
        - asset: asset/font/Pretendard-Regular.otf
          weight: 400
        - asset: asset/font/Pretendard-Medium.otf
          weight: 500
        - asset: asset/font/Pretendard-SemiBold.otf
          weight: 600
        - asset: asset/font/Pretendard-Bold.otf
          weight: 700
